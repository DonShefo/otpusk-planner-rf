  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"\u003c!DOCTYPE html>\n\u003chtml>\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003cscript src=\"afe35968-5558-40a5-a1d0-20c8eb831abc\">\u003c/script>\n\u003c/head>\n\u003cbody>\n\u003cx-dc>\n\u003chelmet>\n\u003cstyle>\n:root{\n  --bg:#EAE5DC;--surface:#FDFAF5;--surface-2:#F4EFE6;\n  --ink:#1C1915;--muted:#7C7265;--line:#DDD6C8;\n  --primary:#3E68B0;--primary-d:#305498;--primary-light:#EEF3FC;\n  --holiday:#B87C28;--holiday-bg:#FDF3E1;\n  --bad:#B83830;--bad-bg:#FCECEA;\n  --warn:#A8640D;--warn-bg:#FDF2DE;\n  --ok:#1A7840;\n  --mono:ui-monospace,\"SF Mono\",Menlo,Consolas,monospace;\n  --sans:-apple-system,BlinkMacSystemFont,\"Segoe UI\",system-ui,Helvetica,Arial,sans-serif;\n  --radius:14px;\n  --shadow:0 1px 3px rgba(28,22,14,.07),0 2px 8px rgba(28,22,14,.04);\n}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}\n.wrap{max-width:none;margin:0;padding:32px 40px 100px}\n\nheader.top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--line)}\nh1{font-size:24px;font-weight:700;letter-spacing:-.4px;color:var(--ink);margin:0;display:flex;align-items:center;gap:14px}\n.sub{color:var(--muted);font-size:13.5px;margin-top:8px;max-width:640px;line-height:1.65}\n\n.yearbox{display:inline-flex;align-items:center;background:var(--primary-light);border:1px solid #C4D5EE;border-radius:11px;padding:3px;gap:2px}\n.yearbox button{border:none;background:transparent;font-size:16px;font-weight:700;color:var(--primary);padding:5px 12px;border-radius:8px;line-height:1;cursor:pointer;transition:background .1s}\n.yearbox button:hover{background:rgba(255,255,255,.85)}\n.yearbox input{width:68px;text-align:center;border:none;background:transparent;font-size:18px;font-weight:700;color:var(--primary);padding:4px 0;font-family:var(--mono)}\n.yearbox input:focus{outline:none}\n\n.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}\nbutton{font-family:inherit;font-size:14px;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 16px;border-radius:9px;cursor:pointer;transition:background .12s,border-color .12s;font-weight:500}\nbutton:hover{border-color:#C0B8AC;background:var(--surface-2)}\nbutton:disabled{opacity:.5;cursor:default}\nbutton.primary{background:var(--primary);border-color:var(--primary);color:#fff}\nbutton.primary:hover{background:var(--primary-d);border-color:var(--primary-d)}\nbutton.ghost{background:transparent;border-color:transparent}\nbutton.ghost:hover{background:var(--surface-2);border-color:var(--line)}\n.setting{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted)}\n.setting input{width:56px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-family:var(--mono);text-align:center;font-size:14px;background:var(--surface);color:var(--ink)}\n.setting input:focus{outline:none;border-color:var(--primary)}\ninput[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--line);border:none;padding:0;cursor:pointer;vertical-align:middle}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}\ninput[type=range]:focus{outline:none}\n.setting .val{font-family:var(--mono);font-size:12px;min-width:36px;display:inline-block;color:var(--primary);font-weight:600}\n\n.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow)}\n.panel>.hd{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;border-bottom:1px solid var(--line)}\n.panel>.hd h2{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.1px;margin:0}\n.panel>.bd{padding:22px}\n\ntable.grid{width:100%;border-collapse:collapse;font-size:14px}\ntable.grid th,table.grid td{border:1px solid var(--line);padding:8px 10px;text-align:center;white-space:nowrap}\ntable.grid thead th{background:var(--surface-2);font-weight:600;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}\ntable.grid thead th.part{background:#EEF3FC;color:var(--primary)}\ntable.grid td.name,table.grid td.pos{text-align:left;vertical-align:top}\ntable.grid input{border:1px solid transparent;background:transparent;font-family:inherit;font-size:14px;padding:4px 6px;border-radius:7px;width:100%}\ntable.grid td.name input,table.grid td.pos input{min-width:140px}\ntable.grid input[type=date]{font-family:var(--mono);width:136px}\ntable.grid input.days{font-family:var(--mono);width:52px;text-align:center}\ntable.grid input:hover{border-color:var(--line)}\ntable.grid input:focus{outline:none;border-color:var(--primary);background:#fff}\n\ntd.name .nrow{display:flex;align-items:center;gap:7px}\ntd.name .nrow2{display:flex;align-items:center;gap:9px;margin-top:6px;padding-left:28px}\n.iconbtn{border:none;background:transparent;color:#C5BAB0;cursor:pointer;font-size:13px;line-height:1;padding:4px 6px;border-radius:6px;flex:none}\n.iconbtn:hover{color:var(--bad);background:var(--bad-bg)}\n.addpart{font-size:12px;padding:4px 11px;color:var(--primary);border:1px solid #C4D5EE;border-radius:8px;background:var(--primary-light);cursor:pointer;font-family:inherit;font-weight:500}\n.addpart:hover{background:#E0ECFA}\n.addpart:disabled{color:var(--muted);border-color:var(--line);cursor:not-allowed;background:var(--surface-2)}\n.pcount{font-size:12px;color:var(--muted);font-family:var(--mono)}\ntd.end{font-family:var(--mono);color:var(--muted);font-size:13px;position:relative;padding-right:26px!important}\ntd.end.shift{color:var(--holiday);font-weight:600}\ntd.end .pdel{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:12px}\n.chip{display:inline-block;min-width:30px;font-family:var(--mono);font-weight:600;padding:3px 9px;border-radius:20px;font-size:13px}\n.chip.used{background:var(--primary-light);color:var(--primary)}\n.chip.left.pos{background:#E5F5EE;color:var(--ok)}\n.chip.left.zero{background:var(--surface-2);color:var(--muted)}\n.chip.bad{background:var(--bad-bg);color:var(--bad)}\n.addemp-bar{margin-top:16px;display:flex;gap:12px;align-items:center}\n.scrollhint{font-size:13px;color:var(--muted);margin:0 0 14px}\n\n.flags{margin-top:16px;display:flex;flex-direction:column;gap:6px}\n.flag{font-size:13.5px;padding:10px 14px;border-radius:10px;display:flex;gap:9px;align-items:flex-start}\n.flag.err{background:var(--bad-bg);color:#922520}\n.flag.warn{background:var(--warn-bg);color:#84500B}\n.flag b{font-weight:600}\n.flag .dot{flex:none;font-weight:700}\n\n.hol-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}\n.holchip{display:inline-flex;align-items:center;gap:6px;background:var(--holiday-bg);border:1px solid #EAD4A2;color:var(--holiday);font-family:var(--mono);font-size:13px;padding:4px 6px 4px 11px;border-radius:20px}\n.holchip button{border:none;background:transparent;color:var(--holiday);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:50%;line-height:1}\n.holchip button:hover{background:#EAD4A2}\n.hol-empty{color:var(--muted);font-size:13.5px;padding:4px 0}\n.hol-addrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}\n.hol-addrow input[type=date]{font-family:var(--mono);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:14px;background:var(--surface);color:var(--ink)}\n.hol-addrow input[type=date]:focus{outline:none;border-color:var(--primary)}\n.hol-status{font-size:13px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n.hol-status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none}\n.hol-status.ok .dot{background:var(--ok)}\n.hol-status.err .dot{background:var(--bad)}\n.hol-status.warn .dot{background:var(--holiday)}\n.hol-status a{color:var(--primary)}\n\n.tl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:var(--surface)}\n.tl{position:relative;font-size:12px}\n.tl-months{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:3}\n.tl-month{border-right:1px solid var(--line);padding:8px 0 7px;text-align:center;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-weight:600}\n.tl-namecol{position:sticky;left:0;background:var(--surface);z-index:4;border-right:1px solid var(--line)}\n.tl-bands{position:absolute;inset:0;z-index:0;pointer-events:none}\n.band-hol{position:absolute;top:0;bottom:0;background:var(--holiday-bg)}\n.band-month{position:absolute;top:0;bottom:0;border-left:1px solid #EDE8DC}\n.tl-row{display:flex;align-items:stretch;border-bottom:1px solid #EDE8DC;position:relative;z-index:1}\n.tl-row:hover{background:#FAF8F3}\n.tl-name{position:sticky;left:0;z-index:2;background:inherit;width:196px;min-width:196px;padding:0 12px;display:flex;align-items:center;gap:9px;border-right:1px solid var(--line);font-size:13px}\n.tl-row:hover .tl-name{background:#FAF8F3}\n.tl-name .sw{width:10px;height:10px;border-radius:4px;flex:none}\n.tl-name .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.tl-track{position:relative;height:38px;flex:1}\n.bar{position:absolute;top:9px;height:20px;border-radius:5px;cursor:pointer;display:flex;align-items:center;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}\n.bar .lab{font-family:var(--mono);font-size:10px;color:#fff;padding:0 5px;text-shadow:0 1px 2px rgba(0,0,0,.28);white-space:nowrap}\n.bar .hol-seg{position:absolute;top:0;bottom:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.55) 0 3px,transparent 3px 6px)}\n.dimmed .bar{opacity:.18}\n.bar.hi{opacity:1!important;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ink);z-index:5}\n.bar.sel{opacity:1!important;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--primary);z-index:6}\n.tl-density{display:flex;align-items:stretch;border-bottom:2px solid var(--line);position:relative;z-index:1;background:var(--surface)}\n.tl-density .tl-name{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}\n.dens-track{position:relative;height:30px;flex:1}\n.dens-day{position:absolute;bottom:0;border-radius:2px}\n.legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-top:14px;font-size:12.5px;color:var(--muted)}\n.legend .k{display:inline-flex;align-items:center;gap:7px}\n.legend .b{width:14px;height:12px;border-radius:4px;display:inline-block}\n\n.conf-empty{color:var(--muted);font-size:14px;padding:4px 0}\n.conf{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:background .1s,border-color .1s}\n.conf:hover{border-color:#C0B8AC;background:var(--surface-2)}\n.conf .when{font-family:var(--mono);font-size:14px;font-weight:600;white-space:nowrap;min-width:124px}\n.conf .cnt{font-family:var(--mono);font-weight:700;color:var(--bad);min-width:50px}\n.conf .who{font-size:13.5px;color:var(--ink)}\n.conf-role{margin-top:6px;font-size:12.5px;color:var(--warn)}\n.conf-role b{color:var(--warn)}\n.detail{font-size:13.5px;color:var(--ink);background:var(--primary-light);border:1px solid #C4D5EE;border-radius:10px;padding:12px 14px;margin-top:8px;display:none}\n.detail.on{display:block}\n.detail b{color:var(--primary)}\n.hint{color:var(--muted);font-size:13px;margin-top:0}\n\n@media print{\n  body{background:#fff}\n  .no-print{display:none!important}\n  .panel{break-inside:avoid;border-color:#ccc;box-shadow:none}\n  .tl-scroll{overflow:visible}\n}\n\u003c/style>\n\u003c/helmet>\n\n\n\n\u003cdiv class=\"wrap\">\n  \u003cheader class=\"top\">\n    \u003cdiv>\n      \u003ch1>График отпусков\n        \u003cspan class=\"yearbox no-print\">\n          \u003cbutton id=\"yPrev\" title=\"Предыдущий год\">‹\u003c/button>\n          \u003cinput id=\"yInput\" type=\"number\">\n          \u003cbutton id=\"yNext\" title=\"Следующий год\">›\u003c/button>\n        \u003c/span>\n      \u003c/h1>\n      \u003cdiv class=\"sub\">Продолжительность вводится в днях. Дата конца считается автоматически: праздничные дни (ст.&nbsp;112 ТК&nbsp;РФ) внутри периода не расходуют отпуск, а сдвигают дату выхода. Лимит&nbsp;— 28 дней, деление на 4+ части. Состав сотрудников общий для всех лет, график и праздники — отдельно по каждому году.\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"controls no-print\" style=\"align-self:flex-start;margin-top:4px\">\n      \u003cspan class=\"setting\">Норма, дн. \u003cinput id=\"setAnnual\" type=\"number\" min=\"1\" max=\"60\">\u003c/span>\n      \u003cspan class=\"setting\">Конфликт при &gt; \u003cinput id=\"setOverlap\" type=\"number\" min=\"1\" max=\"20\"> чел.\u003c/span>\n      \u003cspan class=\"setting\">Шрифт \u003cinput id=\"setZoom\" type=\"range\" min=\"75\" max=\"130\" step=\"5\" style=\"width:80px\"> \u003cspan id=\"setZoomVal\" class=\"val\">100%\u003c/span>\u003c/span>\n      \u003cspan class=\"setting\">График \u003cinput id=\"setTlScale\" type=\"range\" min=\"50\" max=\"300\" step=\"10\" style=\"width:80px\"> \u003cspan id=\"setTlScaleVal\" class=\"val\">100%\u003c/span>\u003c/span>\n    \u003c/div>\n  \u003c/header>\n\n  \u003csection class=\"panel\" id=\"holPanel\">\n    \u003cdiv class=\"hd\">\n      \u003ch2 id=\"holTitle\">Производственный календарь 2026\u003c/h2>\n      \u003cdiv class=\"controls no-print\">\n        \u003cbutton id=\"btnHolUpdate\">Обновить через интернет\u003c/button>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"bd\">\n      \u003cdiv class=\"hol-list\" id=\"holList\">\u003c/div>\n      \u003cdiv class=\"hol-addrow no-print\">\n        \u003cinput type=\"date\" id=\"holInput\">\n        \u003cbutton id=\"btnHolAdd\">+ Добавить дату вручную\u003c/button>\n      \u003c/div>\n      \u003cdiv class=\"hol-status\" id=\"holStatus\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection class=\"panel\">\n    \u003cdiv class=\"hd\">\n      \u003ch2>Сотрудники и части отпуска\u003c/h2>\n      \u003cdiv class=\"controls no-print\">\n        \u003cbutton id=\"btnSort\" class=\"ghost\">Сортировать по фамилии\u003c/button>\n        \u003cbutton id=\"btnSave\">Сохранить файл\u003c/button>\n        \u003cbutton id=\"btnImport\">Импорт\u003c/button>\n        \u003cbutton id=\"btnXlsx\">Экспорт в Excel\u003c/button>\n        \u003cbutton class=\"ghost\" id=\"btnPrint\">Печать\u003c/button>\n        \u003cinput type=\"file\" id=\"fileImport\" accept=\"application/json\" style=\"display:none\">\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"bd\">\n      \u003cp class=\"scrollhint no-print\">Управление (удалить сотрудника, добавить/убрать часть) — в левой колонке. Даты частей листаются вправо&nbsp;↔\u003c/p>\n      \u003cdiv style=\"overflow-x:auto\">\u003ctable class=\"grid\" id=\"tbl\">\u003c/table>\u003c/div>\n      \u003cdiv class=\"addemp-bar no-print\">\u003cbutton class=\"primary\" id=\"btnAdd\">+ Добавить сотрудника\u003c/button>\u003c/div>\n      \u003cdiv class=\"flags\" id=\"flags\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection class=\"panel\">\n    \u003cdiv class=\"hd\">\n      \u003ch2>График года — пересечения\u003c/h2>\n      \u003cdiv class=\"hint no-print\" style=\"margin:0\">Клик по полосе — подсветить, кто пересекается с этим отпуском\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"bd\">\n      \u003cdiv class=\"tl-scroll\">\u003cdiv class=\"tl\" id=\"tl\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"legend\">\n        \u003cspan class=\"k\">\u003cspan class=\"b\" style=\"background:var(--holiday-bg);box-shadow:inset 0 0 0 1px var(--holiday)\">\u003c/span>праздничный день\u003c/span>\n        \u003cspan class=\"k\">\u003cspan class=\"b\" style=\"background-image:repeating-linear-gradient(45deg,#888 0 3px,transparent 3px 6px);background-color:#bbb\">\u003c/span>праздник внутри отпуска (не тратит дни)\u003c/span>\n        \u003cspan class=\"k\">\u003cspan class=\"b\" style=\"background:#f3c0c0\">\u003c/span>превышение порога одновременных отпусков\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection class=\"panel\">\n    \u003cdiv class=\"hd\">\u003ch2>Окна перегрузки\u003c/h2>\u003c/div>\n    \u003cdiv class=\"bd\">\n      \u003cdiv id=\"conflicts\">\u003c/div>\n      \u003cdiv class=\"detail\" id=\"detail\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\u003c/div>\n\u003c/x-dc>\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    \"use strict\";\n    const MAXP = 8;\n    const MONTHS = [\"Янв\",\"Фев\",\"Мар\",\"Апр\",\"Май\",\"Июн\",\"Июл\",\"Авг\",\"Сен\",\"Окт\",\"Ноя\",\"Дек\"];\n    const DAY = 86400000;\n    let DAYW = 3.25; const NAMEW = 196;\n\n    const BUILTIN_HOLIDAYS = {\n      \"2025\": [\"2025-01-01\",\"2025-01-02\",\"2025-01-03\",\"2025-01-04\",\"2025-01-05\",\"2025-01-06\",\"2025-01-07\",\"2025-01-08\",\"2025-02-23\",\"2025-03-08\",\"2025-05-01\",\"2025-05-09\",\"2025-06-12\",\"2025-11-04\"],\n      \"2026\": [\"2026-01-01\",\"2026-01-02\",\"2026-01-03\",\"2026-01-04\",\"2026-01-05\",\"2026-01-06\",\"2026-01-07\",\"2026-01-08\",\"2026-02-23\",\"2026-03-08\",\"2026-05-01\",\"2026-05-09\",\"2026-06-12\",\"2026-11-04\"]\n    };\n\n    const SEED = [\n      {name:\"Иванов Иван\", position:\"Менеджер по продажам\", parts:[{start:\"2026-04-06\",days:14},{start:\"2026-07-13\",days:7},{start:\"2026-10-05\",days:7}]}\n    ];\n\n    const LS = \"grafik_otpuskov_v2\";\n\n    function withId(e){ e.id = e.id||(\"e\"+Math.random().toString(36).slice(2,9)); return e; }\n\n    function seedState(){\n      const employees = SEED.map(s=>withId({name:s.name,position:s.position}));\n      const sched2026 = {};\n      SEED.forEach((s,i)=>{ sched2026[employees[i].id]=s.parts.map(p=>({start:p.start,days:p.days})); });\n      return {\n        annual:28, overlap:2, year:2026,\n        employees,\n        schedules:{\"2026\":sched2026},\n        holidays:{\"2025\":BUILTIN_HOLIDAYS[\"2025\"].slice(),\"2026\":BUILTIN_HOLIDAYS[\"2026\"].slice()},\n        holidaysMeta:{\"2026\":{source:\"встроенные данные\",updated:null}}\n      };\n    }\n\n    function migrate(s){\n      if(!s.year) s.year=2026;\n      if(!s.schedules) s.schedules={};\n      if(!s.holidays) s.holidays={};\n      if(!s.holidaysMeta) s.holidaysMeta={};\n      (s.employees||[]).forEach(e=>{\n        withId(e);\n        if(e.parts){\n          const yK=String(s.year);\n          if(!s.schedules[yK]) s.schedules[yK]={};\n          if(!s.schedules[yK][e.id]) s.schedules[yK][e.id]=e.parts;\n          delete e.parts;\n        }\n      });\n      return s;\n    }\n\n    function load(){ try{ const s=JSON.parse(localStorage.getItem(LS)); if(s&&s.employees) return migrate(s); }catch(e){} return null; }\n    function save(){ try{ localStorage.setItem(LS,JSON.stringify(state)); }catch(e){} }\n\n    let state = load()||seedState();\n    let selected = null;\n    let zoomLevel = +(localStorage.getItem('grf_zoom')||100);\n    let tlScalePct = +(localStorage.getItem('grf_tlscale')||100);\n\n    function yearKey(){ return String(state.year); }\n    function yearStart(){ return Date.UTC(state.year,0,1); }\n    function daysInYear(){ const y=state.year; const leap=(y%4===0&&y%100!==0)||y%400===0; return leap?366:365; }\n    function ensureYear(y){\n      const yK=String(y);\n      if(!state.schedules[yK]) state.schedules[yK]={};\n      if(!state.holidays[yK]){\n        if(BUILTIN_HOLIDAYS[yK]){ state.holidays[yK]=BUILTIN_HOLIDAYS[yK].slice(); state.holidaysMeta[yK]={source:\"встроенные данные\",updated:null}; }\n        else { state.holidays[yK]=[]; state.holidaysMeta[yK]={source:null,updated:null}; }\n      }\n    }\n    function partsFor(emp){\n      const yK=yearKey();\n      if(!state.schedules[yK]) state.schedules[yK]={};\n      if(!state.schedules[yK][emp.id]) state.schedules[yK][emp.id]=[];\n      return state.schedules[yK][emp.id];\n    }\n    function holidaySet(){ return new Set(state.holidays[yearKey()]||[]); }\n\n    function pad(n){ return n\u003c10?\"0\"+n:\"\"+n; }\n    function iso(t){ const d=new Date(t); return d.getUTCFullYear()+\"-\"+pad(d.getUTCMonth()+1)+\"-\"+pad(d.getUTCDate()); }\n    function parse(s){ if(!s)return null; const m=/^(\\d{4})-(\\d{2})-(\\d{2})$/.exec(s); if(!m)return null; return Date.UTC(+m[1],+m[2]-1,+m[3]); }\n    function idxOf(t){ return Math.round((t-yearStart())/DAY); }\n    function fmtRu(t){ const d=new Date(t); return pad(d.getUTCDate())+\".\"+pad(d.getUTCMonth()+1); }\n    function fmtRuFull(isoStr){ const m=/^(\\d{4})-(\\d{2})-(\\d{2})$/.exec(isoStr); return m?`${m[3]}.${m[2]}.${m[1]}`:isoStr; }\n    function fmtDateTime(s){ if(!s)return\"\"; const d=new Date(s); return pad(d.getDate())+\".\"+pad(d.getMonth()+1)+\".\"+d.getFullYear()+\" \"+pad(d.getHours())+\":\"+pad(d.getMinutes()); }\n    function isHol(t,hset){ return (hset||holidaySet()).has(iso(t)); }\n\n    function computeEnd(startT,days,hset){\n      if(startT==null||!(days>0)) return null;\n      let t=startT,counted=0,holsInside=0,end=startT;\n      const limit=daysInYear()*3; let guard=0;\n      while(true){\n        if(isHol(t,hset)){ holsInside++; } else { counted++; end=t; }\n        if(counted===days) break;\n        t+=DAY; guard++;\n        if(guard>limit) break;\n      }\n      return { end, holsInside, span:Math.round((end-startT)/DAY)+1 };\n    }\n\n    function empDerived(e){\n      const hset=holidaySet();\n      const arr=partsFor(e);\n      const parts=arr.map(p=>{\n        const s=parse(p.start); const r=computeEnd(s,p.days,hset);\n        return { start:s, days:p.days||0, end:r?r.end:null, span:r?r.span:0, hols:r?r.holsInside:0, raw:p };\n      });\n      const used=parts.reduce((a,p)=>a+(p.days||0),0);\n      return { parts, used, left:state.annual-used };\n    }\n\n    function occupancy(){\n      const days=new Array(daysInYear()).fill(null).map(()=>[]);\n      state.employees.forEach(e=>{\n        empDerived(e).parts.forEach(p=>{\n          if(p.start==null||!p.end) return;\n          for(let t=p.start;t\u003c=p.end;t+=DAY){ const i=idxOf(t); if(i>=0&&i\u003cdaysInYear()) days[i].push(e.id); }\n        });\n      });\n      return days.map(a=>Array.from(new Set(a)));\n    }\n\n    function color(i){ return `hsl(${(i*47)%360} 58% 52%)`; }\n    function nameById(id){ const e=state.employees.find(x=>x.id===id); return e?e.name:\"?\"; }\n    function esc(s){ return (s==null?\"\":(\"\"+s)).replace(/[&\u003c>\"]/g,c=>({\"&\":\"&amp;\",\"\u003c\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\"}[c])); }\n\n    // ── Holidays panel ──\n    function renderHolidays(){\n      const yK=yearKey();\n      document.getElementById(\"holTitle\").textContent=\"Производственный календарь \"+state.year;\n      const list=(state.holidays[yK]||[]).slice().sort();\n      const el=document.getElementById(\"holList\");\n      el.innerHTML=list.length\n        ?list.map(d=>`\u003cspan class=\"holchip\">${fmtRuFull(d)}\u003cbutton data-act=\"delhol\" data-date=\"${d}\" title=\"Убрать\">✕\u003c/button>\u003c/span>`).join(\"\")\n        :`\u003cdiv class=\"hol-empty\">Праздники на ${state.year} год не заданы — расчёт пойдёт без сдвига дат на праздники. Нажмите «Обновить через интернет» или добавьте даты вручную.\u003c/div>`;\n      const meta=state.holidaysMeta[yK]||{};\n      const st=document.getElementById(\"holStatus\");\n      if(meta.error){\n        st.className=\"hol-status err\";\n        st.innerHTML=`\u003cspan class=\"dot\">\u003c/span>Не удалось обновить онлайн: ${esc(meta.error)}. ${list.length?\"Используются текущие сохранённые даты.\":\"Добавьте даты вручную.\"}`;\n      } else if(meta.updated){\n        st.className=\"hol-status ok\";\n        st.innerHTML=`\u003cspan class=\"dot\">\u003c/span>Обновлено ${fmtDateTime(meta.updated)} · источник: \u003ca href=\"https://github.com/xmlcalendar/data\" target=\"_blank\" rel=\"noopener\">xmlcalendar/data (GitHub)\u003c/a>`;\n      } else if(meta.source===\"встроенные данные\"){\n        st.className=\"hol-status\";\n        st.innerHTML=`\u003cspan class=\"dot\">\u003c/span>Встроенные данные на ${state.year} год (без онлайн-проверки). Можно обновить через интернет.`;\n      } else {\n        st.className=\"hol-status warn\";\n        st.innerHTML=`\u003cspan class=\"dot\">\u003c/span>Данные не из официального источника — заданы вручную или отсутствуют.`;\n      }\n    }\n\n    document.getElementById(\"holPanel\").addEventListener(\"click\",ev=>{\n      const btn=ev.target.closest('button[data-act=\"delhol\"]'); if(!btn) return;\n      const yK=yearKey();\n      state.holidays[yK]=(state.holidays[yK]||[]).filter(d=>d!==btn.dataset.date);\n      renderAll();\n    });\n\n    document.getElementById(\"btnHolAdd\").onclick=()=>{\n      const inp=document.getElementById(\"holInput\"); const v=inp.value; if(!v) return;\n      const yK=yearKey(); if(!state.holidays[yK]) state.holidays[yK]=[];\n      if(!state.holidays[yK].includes(v)) state.holidays[yK].push(v);\n      if(!state.holidaysMeta[yK]||!state.holidaysMeta[yK].updated) state.holidaysMeta[yK]={source:\"добавлено вручную\",updated:null};\n      inp.value=\"\"; renderAll();\n    };\n\n    async function fetchHolidaysOnline(year){\n      const url=`https://raw.githubusercontent.com/xmlcalendar/data/master/ru/${year}/calendar.xml`;\n      let res;\n      try{ res=await fetch(url,{cache:\"no-store\"}); }\n      catch(e){ throw new Error(\"нет соединения или браузер заблокировал запрос\"); }\n      if(!res.ok) throw new Error(res.status===404?`данные за ${year} год пока не опубликованы`:`сервер вернул ошибку ${res.status}`);\n      const text=await res.text();\n      const doc=new DOMParser().parseFromString(text,\"application/xml\");\n      if(doc.querySelector(\"parsererror\")) throw new Error(\"повреждённый ответ сервера\");\n      const days=Array.from(doc.getElementsByTagName(\"day\"));\n      const out=[];\n      days.forEach(d=>{\n        const t=d.getAttribute(\"t\"),h=d.getAttribute(\"h\"),f=d.getAttribute(\"f\"),dd=d.getAttribute(\"d\");\n        if(t===\"1\"&&h&&!f){ const m=dd.split(\".\"); out.push(`${year}-${m[0]}-${m[1]}`); }\n      });\n      if(!out.length) throw new Error(\"в ответе не найдено праздничных дат\");\n      return out;\n    }\n\n    document.getElementById(\"btnHolUpdate\").onclick=async()=>{\n      const btn=document.getElementById(\"btnHolUpdate\"); const y=state.year; const yK=String(y);\n      btn.disabled=true; const old=btn.textContent; btn.textContent=\"Обновляю…\";\n      try{\n        const dates=await fetchHolidaysOnline(y);\n        state.holidays[yK]=dates;\n        state.holidaysMeta[yK]={source:\"xmlcalendar/data (GitHub)\",updated:new Date().toISOString()};\n      }catch(err){\n        state.holidaysMeta[yK]={...(state.holidaysMeta[yK]||{}),error:err.message};\n      }\n      btn.disabled=false; btn.textContent=old;\n      renderAll();\n    };\n\n    // ── Table ──\n    function renderTable(){\n      const maxParts=Math.max(4,...state.employees.map(e=>partsFor(e).length));\n      let head=`\u003cthead>\u003ctr>\u003cth rowspan=\"2\" class=\"name\">Сотрудник\u003c/th>\u003cth rowspan=\"2\" class=\"pos\">Должность\u003c/th>`;\n      for(let i=0;i\u003cmaxParts;i++) head+=`\u003cth class=\"part\" colspan=\"3\">Часть ${i+1}\u003c/th>`;\n      head+=`\u003cth rowspan=\"2\">Изр.\u003c/th>\u003cth rowspan=\"2\">Ост.\u003c/th>\u003c/tr>\u003ctr>`;\n      for(let i=0;i\u003cmaxParts;i++) head+=`\u003cth class=\"part\">начало\u003c/th>\u003cth class=\"part\">дней\u003c/th>\u003cth class=\"part\">конец\u003c/th>`;\n      head+=`\u003c/tr>\u003c/thead>`;\n      let body=\"\u003ctbody>\";\n      state.employees.forEach((e,ei)=>{\n        const d=empDerived(e);\n        const eParts=partsFor(e);\n        body+=`\u003ctr data-emp=\"${e.id}\">`;\n        body+=`\u003ctd class=\"name\">\n          \u003cdiv class=\"nrow\">\n            \u003cbutton class=\"iconbtn no-print\" data-act=\"delemp\" title=\"Удалить сотрудника\">✕\u003c/button>\n            \u003cinput data-f=\"name\" value=\"${esc(e.name)}\" placeholder=\"Фамилия Имя\">\n          \u003c/div>\n          \u003cdiv class=\"nrow2 no-print\">\n            \u003cbutton class=\"addpart\" data-act=\"addpart\" ${eParts.length>=MAXP?\"disabled\":\"\"}>+ часть\u003c/button>\n            \u003cspan class=\"pcount\">${eParts.length} ч.\u003c/span>\n          \u003c/div>\n        \u003c/td>`;\n        body+=`\u003ctd class=\"pos\">\u003cinput data-f=\"position\" value=\"${esc(e.position)}\" placeholder=\"Должность\">\u003c/td>`;\n        for(let i=0;i\u003cmaxParts;i++){\n          const p=eParts[i],dp=d.parts[i];\n          if(p){\n            const endTxt=dp&&dp.end?fmtRu(dp.end)+\".\"+new Date(dp.end).getUTCFullYear():\"—\";\n            const shift=dp&&dp.hols>0?\" shift\":\"\";\n            body+=`\u003ctd>\u003cinput type=\"date\" data-pi=\"${i}\" data-f=\"start\" value=\"${esc(p.start||\"\")}\">\u003c/td>`;\n            body+=`\u003ctd>\u003cinput class=\"days\" data-pi=\"${i}\" data-f=\"days\" value=\"${p.days||\"\"}\" inputmode=\"numeric\">\u003c/td>`;\n            body+=`\u003ctd class=\"end${shift}\" title=\"${dp&&dp.hols>0?(\"сдвиг +\"+dp.hols+\" дн. (праздники)\"):\"\"}\">${endTxt}\u003cbutton class=\"iconbtn pdel no-print\" data-act=\"delpart\" data-pi=\"${i}\" title=\"Удалить часть ${i+1}\">✕\u003c/button>\u003c/td>`;\n          } else {\n            body+=`\u003ctd>\u003c/td>\u003ctd>\u003c/td>\u003ctd>\u003c/td>`;\n          }\n        }\n        const usedCls=d.used>state.annual?\"bad\":\"used\";\n        const leftCls=d.left\u003c0?\"left bad\":(d.left===0?\"left zero\":\"left pos\");\n        body+=`\u003ctd>\u003cspan class=\"chip ${usedCls}\">${d.used}\u003c/span>\u003c/td>`;\n        body+=`\u003ctd>\u003cspan class=\"chip ${leftCls}\">${d.left}\u003c/span>\u003c/td>`;\n        body+=`\u003c/tr>`;\n      });\n      body+=\"\u003c/tbody>\";\n      document.getElementById(\"tbl\").innerHTML=head+body;\n      renderFlags();\n    }\n\n    function renderFlags(){\n      const out=[];\n      state.employees.forEach(e=>{\n        const d=empDerived(e); const nm=e.name||\"(без имени)\";\n        if(d.used>state.annual) out.push([\"err\",`\u003cb>${esc(nm)}\u003c/b>: запланировано ${d.used} дн. — превышение нормы (${state.annual}).`]);\n        else if(d.used>0&&d.used\u003cstate.annual) out.push([\"warn\",`\u003cb>${esc(nm)}\u003c/b>: выбрано ${d.used} из ${state.annual} дн. нормы — отпуск распланирован не полностью.`]);\n        const hasLong=d.parts.some(p=>(p.days||0)>=14);\n        if(d.used>0&&!hasLong) out.push([\"warn\",`\u003cb>${esc(nm)}\u003c/b>: ни одна часть не ≥ 14 дней — нарушение ч.1 ст.125 ТК РФ.`]);\n        const segs=d.parts.filter(p=>p.start!=null&&p.end).map(p=>[p.start,p.end]).sort((a,b)=>a[0]-b[0]);\n        for(let i=1;i\u003csegs.length;i++) if(segs[i][0]\u003c=segs[i-1][1]){ out.push([\"err\",`\u003cb>${esc(nm)}\u003c/b>: части отпуска пересекаются по датам.`]); break; }\n        d.parts.forEach((p,i)=>{ if(p.start!=null&&(p.start\u003cyearStart()||p.start>=yearStart()+daysInYear()*DAY)) out.push([\"err\",`\u003cb>${esc(nm)}\u003c/b>: дата начала части ${i+1} вне ${state.year} года.`]); });\n      });\n      const el=document.getElementById(\"flags\");\n      el.innerHTML=out.length\n        ?out.map(([t,m])=>`\u003cdiv class=\"flag ${t}\">\u003cspan class=\"dot\">${t===\"err\"?\"●\":\"▲\"}\u003c/span>\u003cspan>${m}\u003c/span>\u003c/div>`).join(\"\")\n        :`\u003cdiv class=\"flag\" style=\"background:#E5F5EE;color:#176d3c\">\u003cspan class=\"dot\">✓\u003c/span>\u003cspan>Нарушений не обнаружено.\u003c/span>\u003c/div>`;\n    }\n\n    // ── Timeline ──\n    function monthOffsets(){ const o=[]; for(let m=0;m\u003c12;m++) o.push(idxOf(Date.UTC(state.year,m,1))); o.push(daysInYear()); return o; }\n\n    function renderTimeline(){\n      const tlScroll=document.querySelector('.tl-scroll');\n      const availW=tlScroll?tlScroll.clientWidth:(window.innerWidth-80);\n      DAYW=Math.max(2.2,(availW-NAMEW)/daysInYear())*(tlScalePct/100);\n      const occ=occupancy(),offs=monthOffsets(),DIY=daysInYear();\n      const trackW=DIY*DAYW,full=NAMEW+trackW;\n      let html=`\u003cdiv class=\"tl-months\" style=\"width:${full}px\">\u003cdiv class=\"tl-namecol\" style=\"width:${NAMEW}px;min-width:${NAMEW}px\">\u003c/div>`;\n      for(let m=0;m\u003c12;m++){ const w=(offs[m+1]-offs[m])*DAYW; html+=`\u003cdiv class=\"tl-month\" style=\"width:${w}px\">${MONTHS[m]}\u003c/div>`; }\n      html+=`\u003c/div>`;\n      let bands=`\u003cdiv class=\"tl-bands\">`;\n      for(let m=1;m\u003c12;m++) bands+=`\u003cdiv class=\"band-month\" style=\"left:${offs[m]*DAYW}px\">\u003c/div>`;\n      for(let i=0;i\u003cDIY;i++){ if(isHol(yearStart()+i*DAY)) bands+=`\u003cdiv class=\"band-hol\" style=\"left:${i*DAYW}px;width:${DAYW}px\">\u003c/div>`; }\n      bands+=`\u003c/div>`;\n      const maxC=Math.max(1,...occ.map(a=>a.length));\n      html+=`\u003cdiv class=\"tl-density\" style=\"width:${full}px\">\u003cdiv class=\"tl-name\">Одновременно\u003c/div>\u003cdiv class=\"dens-track\" style=\"width:${trackW}px\">${bands}`;\n      for(let i=0;i\u003cDIY;i++){ const c=occ[i].length; if(!c) continue;\n        const h=4+Math.round((c/maxC)*24),over=c>state.overlap;\n        const col=over?\"#B83830\":`hsl(212 65% ${72-Math.round((c/maxC)*30)}%)`;\n        html+=`\u003cdiv class=\"dens-day\" style=\"left:${i*DAYW}px;width:${Math.max(DAYW,1.6)}px;height:${h}px;background:${col}\" title=\"${fmtRu(yearStart()+i*DAY)}: ${c} чел.\">\u003c/div>`;\n      }\n      html+=`\u003c/div>\u003c/div>`;\n      state.employees.forEach((e,ei)=>{\n        const d=empDerived(e);\n        html+=`\u003cdiv class=\"tl-row\" data-emp=\"${e.id}\" style=\"width:${full}px\">\u003cdiv class=\"tl-name\">\u003cspan class=\"sw\" style=\"background:${color(ei)}\">\u003c/span>\u003cspan class=\"nm\" title=\"${esc(e.name)}\">${esc(e.name||\"—\")}\u003c/span>\u003c/div>\u003cdiv class=\"tl-track\" style=\"width:${trackW}px\">${bands}`;\n        d.parts.forEach((p,pi)=>{\n          if(p.start==null||!p.end) return;\n          const x=idxOf(p.start)*DAYW,w=p.span*DAYW;\n          html+=`\u003cdiv class=\"bar\" data-emp=\"${e.id}\" data-pi=\"${pi}\" style=\"left:${x}px;width:${w}px;background:${color(ei)}\" title=\"${esc(e.name)}: ${fmtRu(p.start)}–${fmtRu(p.end)} • ${p.days} дн.${p.hols?(\" (+\"+p.hols+\" празд.\")+\"\":\"\"}\">`;\n          for(let t=p.start;t\u003c=p.end;t+=DAY){ if(isHol(t)){ const rel=Math.round((t-p.start)/DAY)*DAYW; html+=`\u003cspan class=\"hol-seg\" style=\"left:${rel}px;width:${DAYW}px\">\u003c/span>`; } }\n          if(w>28) html+=`\u003cspan class=\"lab\">${p.days}\u003c/span>`;\n          html+=`\u003c/div>`;\n        });\n        html+=`\u003c/div>\u003c/div>`;\n      });\n      const tl=document.getElementById(\"tl\");\n      tl.className=\"tl\"+(selected?\" dimmed\":\"\");\n      tl.innerHTML=html;\n      if(selected) highlightOverlaps();\n    }\n\n    function partRange(empId,pi){ const e=state.employees.find(x=>x.id===empId); if(!e) return null; const p=empDerived(e).parts[pi]; return p&&p.start!=null&&p.end?p:null; }\n\n    function highlightOverlaps(){\n      document.querySelectorAll(\".bar\").forEach(b=>b.classList.remove(\"hi\",\"sel\"));\n      const base=partRange(selected.emp,selected.partIdx); if(!base){ clearDetail(); return; }\n      const selEl=document.querySelector(`.bar[data-emp=\"${selected.emp}\"][data-pi=\"${selected.partIdx}\"]`); if(selEl) selEl.classList.add(\"sel\");\n      const ov=[];\n      state.employees.forEach(e=>{ if(e.id===selected.emp) return;\n        empDerived(e).parts.forEach((p,pi)=>{ if(p.start==null||!p.end) return;\n          if(p.start\u003c=base.end&&p.end>=base.start){\n            const el=document.querySelector(`.bar[data-emp=\"${e.id}\"][data-pi=\"${pi}\"]`); if(el) el.classList.add(\"hi\");\n            ov.push({name:e.name,from:fmtRu(Math.max(p.start,base.start)),to:fmtRu(Math.min(p.end,base.end))});\n          }\n        });\n      });\n      const det=document.getElementById(\"detail\"); det.classList.add(\"on\");\n      const who=ov.length?ov.map(o=>`\u003cb>${esc(o.name)}\u003c/b> (${o.from}–${o.to})`).join(\", \"):\"пересечений нет — сотрудник отдыхает один.\";\n      det.innerHTML=`Отпуск \u003cb>${esc(nameById(selected.emp))}\u003c/b>, ${fmtRu(base.start)}–${fmtRu(base.end)} (${base.days} дн.) пересекается с: ${who}`;\n    }\n\n    // ── Conflicts ──\n    function renderConflicts(){\n      const occ=occupancy(); const windows=[]; let cur=null;\n      for(let i=0;i\u003cdaysInYear();i++){ const c=occ[i].length;\n        if(c>state.overlap){ if(!cur) cur={from:i,to:i,peak:c,ids:new Set(occ[i])}; else{ cur.to=i; if(c>cur.peak) cur.peak=c; occ[i].forEach(x=>cur.ids.add(x)); } }\n        else if(cur){ windows.push(cur); cur=null; }\n      }\n      if(cur) windows.push(cur);\n      const el=document.getElementById(\"conflicts\");\n      if(!windows.length){ el.innerHTML=`\u003cdiv class=\"conf-empty\">Нет дней, где одновременно отдыхает более ${state.overlap} чел. Порог можно изменить вверху.\u003c/div>`; return; }\n      el.innerHTML=windows.map((w,wi)=>{\n        const from=fmtRu(yearStart()+w.from*DAY),to=fmtRu(yearStart()+w.to*DAY);\n        const ids=Array.from(w.ids);\n        const names=ids.map(nameById).join(\", \");\n        const byPos={};\n        ids.forEach(id=>{ const emp=state.employees.find(x=>x.id===id); const pos=(emp&&emp.position||\"\").trim(); if(pos){ (byPos[pos]=byPos[pos]||[]).push(emp.name||\"?\"); } });\n        const roleHits=Object.entries(byPos).filter(([,arr])=>arr.length>=2);\n        const roleHtml=roleHits.length?`\u003cdiv class=\"conf-role\">⚠ Одна должность одновременно: ${roleHits.map(([p,arr])=>`\u003cb>${esc(p)}\u003c/b> — ${arr.length} чел. (${esc(arr.join(\", \"))})`).join(\"; \")}\u003c/div>`:\"\";\n        return `\u003cdiv class=\"conf\" data-from=\"${w.from}\">\u003cspan class=\"when\">${from}–${to}\u003c/span>\u003cspan class=\"cnt\">до ${w.peak}\u003c/span>\u003cspan class=\"who\">${esc(names)}${roleHtml}\u003c/span>\u003c/div>`;\n      }).join(\"\");\n    }\n\n    function renderAll(){ renderHolidays(); renderTable(); renderTimeline(); renderConflicts(); save(); }\n    function clearDetail(){ const d=document.getElementById(\"detail\"); d.classList.remove(\"on\"); d.innerHTML=\"\"; }\n\n    // ── Events ──\n    document.getElementById(\"tbl\").addEventListener(\"input\",ev=>{\n      const inp=ev.target.closest(\"input\"); if(!inp) return;\n      const tr=inp.closest(\"tr\"); const e=state.employees.find(x=>x.id===tr.dataset.emp); if(!e) return;\n      const f=inp.dataset.f;\n      if(f===\"name\"||f===\"position\"){ e[f]=inp.value; renderTimeline(); renderFlags(); save(); }\n      else{\n        const pi=+inp.dataset.pi; const arr=partsFor(e); if(!arr[pi]) arr[pi]={start:\"\",days:0};\n        if(f===\"start\") arr[pi].start=inp.value;\n        if(f===\"days\"){ const v=parseInt(inp.value.replace(/\\D/g,\"\"),10); arr[pi].days=isNaN(v)?0:v; }\n        const d=empDerived(e),dp=d.parts[pi];\n        const endCell=tr.querySelectorAll(\"td.end\")[pi];\n        if(endCell){ const txt=dp&&dp.end?fmtRu(dp.end)+\".\"+new Date(dp.end).getUTCFullYear():\"—\"; endCell.classList.toggle(\"shift\",!!(dp&&dp.hols>0));\n          const btn=endCell.querySelector(\".pdel\"); endCell.textContent=txt; if(btn) endCell.appendChild(btn);\n        }\n        const chips=tr.querySelectorAll(\".chip\");\n        chips[0].textContent=d.used; chips[0].className=\"chip \"+(d.used>state.annual?\"bad\":\"used\");\n        chips[1].textContent=d.left; chips[1].className=\"chip \"+(d.left\u003c0?\"left bad\":(d.left===0?\"left zero\":\"left pos\"));\n        renderFlags(); renderTimeline(); renderConflicts(); save();\n      }\n    });\n\n    document.getElementById(\"tbl\").addEventListener(\"click\",ev=>{\n      const btn=ev.target.closest(\"button\"); if(!btn) return;\n      const tr=btn.closest(\"tr\"); const e=state.employees.find(x=>x.id===tr.dataset.emp); if(!e) return;\n      const act=btn.dataset.act;\n      if(act===\"addpart\"){ const arr=partsFor(e); if(arr.length\u003cMAXP){ arr.push({start:\"\",days:0}); selected=null; clearDetail(); renderAll(); } }\n      else if(act===\"delpart\"){ const pi=+btn.dataset.pi;\n        if(!confirm(`Удалить часть ${pi+1} отпуска сотрудника «${e.name||\"без имени\"}»?`)) return;\n        partsFor(e).splice(pi,1); selected=null; clearDetail(); renderAll(); }\n      else if(act===\"delemp\"){\n        if(!confirm(`Удалить сотрудника «${e.name||\"без имени\"}» и все его части отпуска во всех годах?`)) return;\n        const rid=e.id;\n        state.employees=state.employees.filter(x=>x.id!==rid);\n        Object.keys(state.schedules||{}).forEach(yK=>{ if(state.schedules[yK]) delete state.schedules[yK][rid]; });\n        selected=null; clearDetail(); renderAll(); }\n    });\n\n    document.getElementById(\"btnAdd\").onclick=()=>{\n      state.employees.push(withId({name:\"\",position:\"\"}));\n      renderAll();\n      window.scrollTo({top:document.body.scrollHeight,behavior:\"smooth\"});\n    };\n\n    document.getElementById(\"tl\").addEventListener(\"click\",ev=>{\n      const bar=ev.target.closest(\".bar\");\n      if(!bar){ selected=null; clearDetail(); renderTimeline(); return; }\n      const id=bar.dataset.emp,pi=+bar.dataset.pi;\n      if(selected&&selected.emp===id&&selected.partIdx===pi){ selected=null; clearDetail(); } else selected={emp:id,partIdx:pi};\n      renderTimeline();\n    });\n\n    document.getElementById(\"conflicts\").addEventListener(\"click\",ev=>{\n      const c=ev.target.closest(\".conf\"); if(!c) return;\n      document.querySelector(\".tl-scroll\").scrollTo({left:Math.max(0,(+c.dataset.from)*DAYW-120),behavior:\"smooth\"});\n    });\n\n    document.getElementById(\"setAnnual\").oninput=ev=>{ const v=parseInt(ev.target.value,10); state.annual=isNaN(v)?28:v; renderAll(); };\n    document.getElementById(\"setOverlap\").oninput=ev=>{ const v=parseInt(ev.target.value,10); state.overlap=isNaN(v)?2:v; renderTimeline(); renderConflicts(); save(); };\n\n    function setYear(y){\n      y=Math.max(2000,Math.min(2100,parseInt(y,10)||state.year));\n      state.year=y; ensureYear(y); selected=null; clearDetail();\n      document.getElementById(\"yInput\").value=y;\n      document.title=\"График отпусков \"+y;\n      renderAll();\n    }\n    document.getElementById(\"yPrev\").onclick=()=>setYear(state.year-1);\n    document.getElementById(\"yNext\").onclick=()=>setYear(state.year+1);\n    document.getElementById(\"yInput\").onchange=ev=>setYear(ev.target.value);\n\n    // ── Export ──\n    function tableRows(){\n      const maxParts=Math.max(4,...state.employees.map(e=>partsFor(e).length));\n      const head=[\"Сотрудник\",\"Должность\"];\n      for(let i=0;i\u003cmaxParts;i++) head.push(`Начало ${i+1}`,`Дней ${i+1}`,`Конец ${i+1}`);\n      head.push(\"Положено\",\"Израсходовано\",\"Осталось\");\n      const rows=[head];\n      state.employees.forEach(e=>{ const d=empDerived(e); const eParts=partsFor(e); const r=[e.name||\"\",e.position||\"\"];\n        for(let i=0;i\u003cmaxParts;i++){ const p=eParts[i],dp=d.parts[i];\n          if(p){ r.push(p.start?fmtRu(parse(p.start))+\".\"+new Date(parse(p.start)).getUTCFullYear():\"\",p.days||\"\",dp&&dp.end?fmtRu(dp.end)+\".\"+new Date(dp.end).getUTCFullYear():\"\"); }\n          else r.push(\"\",\"\",\"\");\n        }\n        r.push(state.annual,d.used,d.left); rows.push(r);\n      });\n      return rows;\n    }\n\n    function download(name,data,mime){ const a=document.createElement(\"a\"); a.href=URL.createObjectURL(new Blob([data],{type:mime})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }\n\n    function crc32(buf){let tab=crc32.t||(crc32.t=(()=>{let t=[],c;for(let n=0;n\u003c256;n++){c=n;for(let k=0;k\u003c8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})());let crc=0^-1;for(let i=0;i\u003cbuf.length;i++)crc=(crc>>>8)^tab[(crc^buf[i])&0xFF];return(crc^-1)>>>0;}\n    function u8(s){return new TextEncoder().encode(s);}\n    function colLetter(n){let s=\"\";n++;while(n>0){let r=(n-1)%26;s=String.fromCharCode(65+r)+s;n=(n-r-1)/26;}return s;}\n    function xesc(s){return(\"\"+s).replace(/[&\u003c>\"']/g,c=>({\"&\":\"&amp;\",\"\u003c\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&apos;\"}[c]));}\n    function sheetXml(rows){let r=\"\";rows.forEach((row,ri)=>{let cells=\"\";row.forEach((v,ci)=>{const ref=colLetter(ci)+(ri+1);\n      if(typeof v===\"number\"&&isFinite(v))cells+=`\u003cc r=\"${ref}\">\u003cv>${v}\u003c/v>\u003c/c>`;\n      else if(v===\"\"||v==null){}else cells+=`\u003cc r=\"${ref}\" t=\"inlineStr\">\u003cis>\u003ct xml:space=\"preserve\">${xesc(v)}\u003c/t>\u003c/is>\u003c/c>`;});\n      r+=`\u003crow r=\"${ri+1}\">${cells}\u003c/row>`;});\n      return `\u003c?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\\n\u003cworksheet xmlns=\"http://schemas.openxmlformats.org/spreadsheetml/2006/main\">\u003csheetData>${r}\u003c/sheetData>\u003c/worksheet>`;}\n    function buildXlsx(rows,sheetName){\n      const files=[\n        [\"[Content_Types].xml\",`\u003c?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\\n\u003cTypes xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\">\u003cDefault Extension=\"rels\" ContentType=\"application/vnd.openxmlformats-package.relationships+xml\"/>\u003cDefault Extension=\"xml\" ContentType=\"application/xml\"/>\u003cOverride PartName=\"/xl/workbook.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml\"/>\u003cOverride PartName=\"/xl/worksheets/sheet1.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml\"/>\u003c/Types>`],\n        [\"_rels/.rels\",`\u003c?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\\n\u003cRelationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\">\u003cRelationship Id=\"rId1\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument\" Target=\"xl/workbook.xml\"/>\u003c/Relationships>`],\n        [\"xl/workbook.xml\",`\u003c?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\\n\u003cworkbook xmlns=\"http://schemas.openxmlformats.org/spreadsheetml/2006/main\" xmlns:r=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships\">\u003csheets>\u003csheet name=\"${xesc(sheetName).slice(0,31)}\" sheetId=\"1\" r:id=\"rId1\"/>\u003c/sheets>\u003c/workbook>`],\n        [\"xl/_rels/workbook.xml.rels\",`\u003c?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\\n\u003cRelationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\">\u003cRelationship Id=\"rId1\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet\" Target=\"worksheets/sheet1.xml\"/>\u003c/Relationships>`],\n        [\"xl/worksheets/sheet1.xml\",sheetXml(rows)]\n      ];\n      const enc=files.map(([name,content])=>({name:u8(name),data:u8(content)}));\n      let parts=[],offset=0,central=[];\n      const u16=n=>[n&255,(n>>8)&255],u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];\n      enc.forEach(f=>{const crc=crc32(f.data),sz=f.data.length,nl=f.name.length;\n        const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nl),u16(0));\n        parts.push(new Uint8Array(lh),f.name,f.data);\n        const cd=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nl),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));\n        central.push({head:new Uint8Array(cd),name:f.name});offset+=lh.length+nl+sz;\n      });\n      const cstart=offset;let csize=0;\n      central.forEach(c=>{parts.push(c.head,c.name);csize+=c.head.length+c.name.length;});\n      parts.push(new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(enc.length),u16(enc.length),u32(csize),u32(cstart),u16(0))));\n      let total=parts.reduce((a,p)=>a+p.length,0),out=new Uint8Array(total),pos=0;\n      parts.forEach(p=>{out.set(p,pos);pos+=p.length;});\n      return out;\n    }\n\n    document.getElementById(\"btnXlsx\").onclick=()=>{\n      const bytes=buildXlsx(tableRows(),\"График отпусков \"+state.year);\n      download(`grafik_otpuskov_${state.year}.xlsx`,bytes,\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\");\n    };\n\n\n\n    document.getElementById(\"btnPrint\").onclick=()=>window.print();\n\n    document.getElementById(\"btnSort\").onclick=()=>{\n      state.employees.sort((a,b)=>(a.name||\"\").localeCompare(b.name||\"\",\"ru\",{sensitivity:\"base\"}));\n      selected=null; clearDetail(); renderAll();\n    };\n\n    document.getElementById(\"btnSave\").onclick=()=>{\n      const dump={...state,_app:\"grafik_otpuskov\",_ver:2,_settings:{zoom:zoomLevel,tlScale:tlScalePct}};\n      download(`grafik_otpuskov_${state.year}.json`,JSON.stringify(dump,null,2),\"application/json\");\n    };\n    document.getElementById(\"btnImport\").onclick=()=>document.getElementById(\"fileImport\").click();\n    document.getElementById(\"fileImport\").onchange=ev=>{\n      const f=ev.target.files&&ev.target.files[0]; if(!f) return;\n      const rd=new FileReader();\n      rd.onload=()=>{\n        try{\n          const obj=JSON.parse(rd.result);\n          if(!obj||typeof obj!==\"object\"||!Array.isArray(obj.employees)) throw new Error(\"в файле нет списка сотрудников\");\n          state=migrate(obj);\n          if(obj._settings){\n            if(obj._settings.zoom) applyZoom(Math.max(75,Math.min(130,+obj._settings.zoom||100)));\n            if(obj._settings.tlScale) applyTlScale(Math.max(50,Math.min(300,+obj._settings.tlScale||100)));\n          }\n          selected=null; clearDetail();\n          document.getElementById(\"setAnnual\").value=state.annual;\n          document.getElementById(\"setOverlap\").value=state.overlap;\n          document.getElementById(\"yInput\").value=state.year;\n          document.title=\"График отпусков \"+state.year;\n          renderAll();\n        }catch(err){\n          alert(\"Не удалось импортировать файл: \"+(err&&err.message?err.message:err));\n        }\n        ev.target.value=\"\";\n      };\n      rd.onerror=()=>{ alert(\"Не удалось прочитать файл.\"); ev.target.value=\"\"; };\n      rd.readAsText(f);\n    };\n\n    // ── Init ──\n    document.getElementById(\"setAnnual\").value=state.annual;\n    document.getElementById(\"setOverlap\").value=state.overlap;\n    document.getElementById(\"yInput\").value=state.year;\n    document.title=\"График отпусков \"+state.year;\n    renderAll();\n    window.addEventListener('resize', ()=>renderTimeline());\n\n    function applyZoom(v){\n      zoomLevel=v;\n      document.querySelector('.wrap').style.zoom=v/100;\n      document.getElementById('setZoomVal').textContent=v+'%';\n      document.getElementById('setZoom').value=v;\n      localStorage.setItem('grf_zoom',v);\n    }\n    function applyTlScale(v){\n      tlScalePct=v;\n      document.getElementById('setTlScaleVal').textContent=v+'%';\n      document.getElementById('setTlScale').value=v;\n      localStorage.setItem('grf_tlscale',v);\n      renderTimeline();\n    }\n    document.getElementById('setZoom').oninput=ev=>applyZoom(+ev.target.value);\n    document.getElementById('setTlScale').oninput=ev=>applyTlScale(+ev.target.value);\n    applyZoom(zoomLevel);\n    applyTlScale(tlScalePct);\n  }\n}\n\u003c/script>\n\n\n\u003c/body>\u003c/html>"
  </script>
